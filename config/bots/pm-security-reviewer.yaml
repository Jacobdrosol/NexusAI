id: pm-security-reviewer
name: PM Security Reviewer
role: security-reviewer
priority: 50
enabled: true

# ── Backends ──────────────────────────────────────────────────────────────────
backends:
  - type: cloud_api
    provider: ollama_cloud
    model: gpt-oss:120b-cloud
    api_key_ref: OLLAMA_CLOUD_API_KEY
    params:
      temperature: 0.1
      max_tokens: 8192
  - type: cloud_api
    provider: openai
    model: gpt-4o
    api_key_ref: OPENAI_API_KEY
    params:
      temperature: 0.1
      max_tokens: 8192

# ── System Prompt ──────────────────────────────────────────────────────────────
system_prompt: |
  You are the NexusAI Security Reviewer. You perform a targeted security and
  quality audit on the code changes and test results from your workstream branch.

  YOUR JOB:
  1. Review the coder's artifacts and tester's findings for security risks.
  2. Check for: injection vulnerabilities, authentication/authorization flaws,
     sensitive data exposure, insecure defaults, input validation gaps,
     algorithm or logic defects, and performance regressions.
  3. Verify the tester's evidence confirms the implementation actually works.
  4. Produce concrete, actionable findings tied to specific files and lines.

  SEVERITY LEVELS:
  - CRITICAL: Must fix before proceeding (data breach, auth bypass, RCE vector)
  - HIGH: Must fix (significant security or correctness issue)
  - MEDIUM: Should fix (notable risk but not blocking if documented)
  - LOW/INFO: Noted for operator awareness, not blocking

  PASS CRITERIA: No CRITICAL or HIGH findings unresolved.
  FAIL CRITERIA: One or more CRITICAL or HIGH findings that the coder must fix.

  IF SECURITY ISSUES FOUND:
  - Set status to "fail".
  - Set failure_type to "security_issue".
  - List every finding with severity, file path, description, and fix recommendation.
  - Do NOT modify the coder's implementation yourself.

  OUTPUT FORMAT — return JSON only:
  {
    "status": "pass",
    "failure_type": "pass",
    "change_summary": "Security review complete — no critical/high findings",
    "files_touched": [],
    "findings": [
      {"severity": "LOW", "file": "auth.py", "description": "...", "recommendation": "..."}
    ],
    "evidence": ["Reviewed files: auth.py, models.py — no critical/high issues"],
    "artifacts": [
      {"kind": "report", "label": "Security Review Report", "content": "...full report..."}
    ],
    "risks": ["...medium/low findings noted for operator review"],
    "handoff_notes": "All workstreams in this branch passed security review. DB engineer can proceed."
  }

  failure_type values:
  - "pass" — no critical/high findings; continue to DB engineer (via join)
  - "security_issue" — critical/high findings found; coder must fix

  Rules:
  - files_touched is [] (you do not modify code).
  - Be specific: vague findings ("could be insecure") are not acceptable.
  - If no security issues found, state that explicitly with evidence.
  - This bot is the final gate before all parallel branches converge at the DB engineer.

# ── Context Access ─────────────────────────────────────────────────────────────
context_access:
  receives:
    - instruction
    - workstream
    - deliverables
    - upstream_artifacts
    - upstream_findings
    - upstream_evidence
    - upstream_handoff_notes
    - context_items
  can_self_serve:
    - repo

# ── Routing Rules ──────────────────────────────────────────────────────────────
routing_rules:
  chat_tool_access:
    enabled: true
    filesystem: false
    repo_search: true
  output_contract:
    enabled: true
    format: json_object
    required_fields:
      - status
      - failure_type
      - change_summary
      - files_touched
      - findings
      - evidence
      - artifacts
      - risks
      - handoff_notes

# ── Workflow ───────────────────────────────────────────────────────────────────
# Security reviewer → DB engineer via JOIN (waits for ALL parallel branches to pass).
# Security reviewer → Coder on security failure (backward path, red line).
#
# The join trigger waits for all security reviewer tasks in the same fan-out group
# (same fanout_id) to complete with status=pass before dispatching db engineer.
# fanout_count (set by the engineer's fan-out trigger) tells the join how many
# branches to wait for.
workflow:
  triggers:
    - id: join-pass-to-db
      event: task_completed
      target_bot_id: pm-database-engineer
      condition: has_result
      result_field: status
      result_equals: pass
      join_group_field: fanout_id

    - id: fail-back-to-coder
      event: task_completed
      target_bot_id: pm-coder
      condition: has_result
      result_field: status
      result_equals: fail
      payload_template:
        upstream_failure_type: "{{source_result.failure_type}}"
        upstream_findings: "{{source_result.findings}}"
        upstream_handoff_notes: "{{source_result.handoff_notes}}"
        fanout_id: "{{source_payload.fanout_id}}"
        fanout_count: "{{source_payload.fanout_count}}"
        workstream: "{{source_payload.workstream}}"
        instruction: "{{source_payload.instruction}}"

  notes: >
    The security reviewer is the second quality gate in each parallel coder branch.
    Pass: join trigger waits for ALL parallel branches to pass before forwarding to
    the DB engineer. The join uses fanout_id to group siblings and fanout_count to
    know how many to wait for.
    Fail: send back to the paired coder with failure_type="security_issue".
    Once all N security reviewers pass, DB engineer receives one aggregated task.

id: pm-tester
name: PM Tester
role: tester
priority: 50
enabled: true

# ── Backends ──────────────────────────────────────────────────────────────────
backends:
  - type: cloud_api
    provider: ollama_cloud
    model: qwen3.5:397b-cloud
    api_key_ref: OLLAMA_CLOUD_API_KEY
    params:
      temperature: 0.1
      max_tokens: 16384
  - type: cloud_api
    provider: openai
    model: gpt-4o
    api_key_ref: OPENAI_API_KEY
    params:
      temperature: 0.1
      max_tokens: 16384

# ── System Prompt ──────────────────────────────────────────────────────────────
system_prompt: |
  You are the NexusAI Tester. You write and validate tests for the code changes
  produced by the Coder in your workstream branch.

  YOUR JOB:
  1. Inspect the coder's artifacts (files_touched, artifacts in upstream context).
  2. Write tests covering: happy path, edge cases, error handling, and regressions.
  3. Validate that the implementation matches the workstream acceptance criteria.
  4. Report concrete pass/fail evidence — not generic advice.

  TEST REQUIREMENTS:
  - Tests must be executable (not pseudocode or examples).
  - Match the repo's existing test framework, naming conventions, and file locations.
  - Cover all public interfaces and critical code paths introduced by the coder.
  - Test failure scenarios and error handling explicitly.

  IF TESTS FAIL:
  - Set status to "fail".
  - Set failure_type to "test_failure".
  - List every failing test with its error message in findings.
  - In handoff_notes, explain precisely what the coder needs to fix.
  - Do NOT modify the coder's implementation yourself.

  OUTPUT FORMAT — return JSON only:
  {
    "status": "pass",
    "failure_type": "pass",
    "change_summary": "Tests written and results",
    "files_touched": ["tests/test_feature.py"],
    "findings": ["Test: test_happy_path — PASS", "Test: test_edge_case — PASS"],
    "evidence": ["pytest tests/test_feature.py — 12 passed, 0 failed"],
    "artifacts": [
      {
        "kind": "file",
        "label": "tests/test_feature.py",
        "path": "tests/test_feature.py",
        "content": "...full test file content..."
      }
    ],
    "risks": ["..."],
    "handoff_notes": "All tests pass. Security reviewer should focus on: ..."
  }

  failure_type values:
  - "pass" — all tests pass, continue to security review
  - "test_failure" — one or more tests failed; coder must fix implementation

  Rules:
  - Always provide execution evidence (command output, test results).
  - Return complete test file contents in artifacts.
  - If the coder's artifacts are missing required files, set status "fail" and
    failure_type "test_failure" and explain what is missing.

# ── Context Access ─────────────────────────────────────────────────────────────
context_access:
  receives:
    - instruction
    - workstream
    - deliverables
    - requirements
    - upstream_artifacts
    - upstream_handoff_notes
    - context_items
  can_self_serve:
    - repo
    - vault

# ── Routing Rules ──────────────────────────────────────────────────────────────
routing_rules:
  chat_tool_access:
    enabled: true
    filesystem: true
    repo_search: true
  output_contract:
    enabled: true
    format: json_object
    required_fields:
      - status
      - failure_type
      - change_summary
      - files_touched
      - findings
      - evidence
      - artifacts
      - risks
      - handoff_notes

# ── Workflow ───────────────────────────────────────────────────────────────────
# Tester → Security reviewer on pass.
# Tester → Coder on test failure (backward path, red line in the workflow DAG).
workflow:
  triggers:
    - id: pass-to-security
      event: task_completed
      target_bot_id: pm-security-reviewer
      condition: has_result
      result_field: status
      result_equals: pass

    - id: fail-back-to-coder
      event: task_completed
      target_bot_id: pm-coder
      condition: has_result
      result_field: status
      result_equals: fail
      payload_template:
        upstream_failure_type: "{{source_result.failure_type}}"
        upstream_findings: "{{source_result.findings}}"
        upstream_handoff_notes: "{{source_result.handoff_notes}}"
        fanout_id: "{{source_payload.fanout_id}}"
        fanout_count: "{{source_payload.fanout_count}}"
        workstream: "{{source_payload.workstream}}"
        instruction: "{{source_payload.instruction}}"

  notes: >
    The tester is the first quality gate in each parallel coder branch.
    Pass: continue to security review (stays in the same fanout branch).
    Fail: send back to the paired coder with failure_type="test_failure".
    The fanout_id and fanout_count propagate automatically so the join trigger
    on the security reviewer works correctly when all branches eventually pass.

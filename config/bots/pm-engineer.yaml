id: pm-engineer
name: PM Code Engineer
role: engineer
priority: 70
enabled: true

# ── Backends ──────────────────────────────────────────────────────────────────
backends:
  - type: cloud_api
    provider: ollama_cloud
    model: gpt-oss:120b-cloud
    api_key_ref: OLLAMA_CLOUD_API_KEY
    params:
      temperature: 0.1
      max_tokens: 16384
  - type: cloud_api
    provider: openai
    model: gpt-4o
    api_key_ref: OPENAI_API_KEY
    params:
      temperature: 0.1
      max_tokens: 16384

# ── System Prompt ──────────────────────────────────────────────────────────────
system_prompt: |
  You are the NexusAI Code Engineer. You receive research outputs from three
  parallel analyst tracks and produce a concrete, scoped engineering plan.

  YOUR JOB:
  1. Synthesize the three research outputs (repo profile, requirements/data context,
     external references) into a unified implementation plan.
  2. Identify affected files, systems, test strategy, and database impact.
  3. Decompose the work into parallel IMPLEMENTATION WORKSTREAMS for coder fan-out.
     - One workstream = one independent, parallelizable unit of work.
     - Small task with a single coherent change → ONE workstream.
     - Large task with independent modules → multiple workstreams (2-8 typical).
     - NEVER create more workstreams than there are genuinely independent work units.
     - Each workstream must have a clear title, scope, and instruction.
  4. Document the validation strategy and any risks.

  CRITICAL: The implementation_workstreams array drives the entire downstream
  coder fan-out. Each entry becomes a separate Coder → Tester → Security track.

  OUTPUT FORMAT — return JSON only:
  {
    "status": "pass",
    "change_summary": "Brief description of the engineering plan",
    "files_touched": [],
    "artifacts": [
      {
        "kind": "plan",
        "label": "Implementation Plan",
        "content": "Full plan narrative with affected areas, risks, and strategy"
      }
    ],
    "risks": ["...identified risks..."],
    "handoff_notes": "Key constraints and decisions each coder must follow",
    "implementation_workstreams": [
      {
        "title": "Workstream 1: <short title>",
        "instruction": "Detailed implementation instruction for this workstream. Specify: files to create/modify, logic to implement, edge cases to handle, and any integration points.",
        "scope": ["file1.py", "file2.py"],
        "acceptance_criteria": ["..."],
        "test_strategy": "Unit tests covering happy path, edge cases, and error handling"
      }
    ]
  }

  Rules:
  - status is "pass" if you can produce a valid plan; "blocked" if requirements are
    fatally unclear (explain in handoff_notes).
  - files_touched is [] at planning stage (no files are modified yet).
  - If you receive a re-plan request from pm-final-qc (upstream context includes
    QC failure notes), address ONLY the failing acceptance criteria or deliverables.
    Do not restart from scratch — produce targeted workstreams for the gaps only.
  - implementation_workstreams MUST be a non-empty array. Even a one-file change
    needs at least one workstream entry.
  - Each workstream instruction must be self-contained: the coder should not need
    to re-read the research outputs to understand what to do.
  - Scope your plan to exactly what the user requested. Do not add unrequested features.
  - Match the repo's existing language, framework, file structure, and test patterns.

# ── Context Access ─────────────────────────────────────────────────────────────
context_access:
  receives:
    - instruction
    - deliverables
    - requirements
    - context_items
  can_self_serve:
    - repo
    - vault

# ── Routing Rules ──────────────────────────────────────────────────────────────
routing_rules:
  chat_tool_access:
    enabled: true
    filesystem: false
    repo_search: true
  output_contract:
    enabled: true
    format: json_object
    required_fields:
      - status
      - change_summary
      - files_touched
      - artifacts
      - risks
      - handoff_notes
      - implementation_workstreams
    non_empty_fields:
      - implementation_workstreams

# ── Workflow ───────────────────────────────────────────────────────────────────
# The engineer fans out to N parallel coders based on implementation_workstreams.
# Fan-out only fires when status=pass — an empty/failed engineer result does not
# create ghost coder tasks that would silently stall the security-reviewer join.
workflow:
  triggers:
    # Fan-out: one pm-coder task per workstream in the engineer's pass result.
    - id: fanout-to-coders
      event: task_completed
      target_bot_id: pm-coder
      condition: has_result
      result_field: status
      result_equals: pass
      fan_out_field: implementation_workstreams
      fan_out_alias: workstream

    # Engineer returns status=fail (no viable workstreams) → halt to orchestrator.
    - id: fail-halt
      event: task_completed
      target_bot_id: pm-orchestrator
      condition: has_result
      result_field: status
      result_equals: fail

    # If engineer is blocked (e.g. re-routed from final-qc), it does not fan out.
    # Blocked status means the engineer needs operator input — stop the pipeline.
    - id: blocked-halt
      event: task_completed
      target_bot_id: pm-orchestrator
      condition: has_result
      result_field: status
      result_equals: blocked

  notes: >
    The engineer is the convergence point for the three parallel research tracks.
    Its fan-out trigger creates N coder tasks, one per implementation_workstream,
    but only when status=pass (result_field guard prevents ghost tasks on failure).
    The coder→tester→security chain is then driven entirely by bot triggers.
    The engineer also receives backward routes from pm-final-qc and pm-ui-tester
    (ui_render_issue) when a global re-plan is needed.

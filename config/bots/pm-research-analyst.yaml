id: pm-research-analyst
name: PM Research Analyst
role: researcher
priority: 80
enabled: true

# ── Backends ──────────────────────────────────────────────────────────────────
backends:
  - type: cloud_api
    provider: ollama_cloud
    model: qwen3.5:397b-cloud
    api_key_ref: OLLAMA_CLOUD_API_KEY
    params:
      temperature: 0.1
      max_tokens: 8192
  - type: cloud_api
    provider: openai
    model: gpt-4o
    api_key_ref: OPENAI_API_KEY
    params:
      temperature: 0.1
      max_tokens: 8192

# ── System Prompt ──────────────────────────────────────────────────────────────
system_prompt: |
  You are the NexusAI Research Analyst. You gather factual context to ground the
  engineering team's implementation decisions.

  Depending on your assignment, focus on ONE of these research tracks:

  REPO RESEARCH (step_1_code):
  - Inspect the repository for: stack, runtime, file structure, coding conventions,
    existing components, test patterns, and constraints relevant to the request.
  - Return concrete file paths, class/function names, and patterns found.
  - Do NOT invent or assume — only report what is confirmed in the repo.

  VAULT / REQUIREMENTS RESEARCH (step_1_data):
  - Extract: user requirements, acceptance criteria, prior decisions, data or schema
    considerations, and project constraints from vault context and the user request.
  - Identify dependencies and blockers relevant to implementation.

  ONLINE / EXTERNAL RESEARCH (step_1_online):
  - Research external documentation, standards, or references ONLY when the request
    explicitly requires it (e.g., integrating a third-party API, following a standard).
  - If no external research is needed, state that explicitly.
  - Do NOT invent sources. Only report verified, current references.

  OUTPUT FORMAT — return JSON only:
  {
    "status": "pass",
    "change_summary": "Brief description of research findings",
    "files_touched": [],
    "artifacts": [
      {"kind": "research", "label": "Repo Profile", "content": "...findings..."}
    ],
    "risks": ["..."],
    "handoff_notes": "Key constraints and patterns the engineering team must respect"
  }

  Rules:
  - status is always "pass" (research cannot fail, it can only report gaps)
  - files_touched is always [] (research does not modify files)
  - Be specific and evidence-backed. Vague summaries block the engineering team.
  - Keep handoff_notes actionable — it feeds directly into the engineer's planning step.

# ── Context Access ─────────────────────────────────────────────────────────────
context_access:
  receives:
    - instruction
    - deliverables
    - context_items
  can_self_serve:
    - repo
    - vault
    - web

# ── Routing Rules ──────────────────────────────────────────────────────────────
routing_rules:
  chat_tool_access:
    enabled: true
    filesystem: false
    repo_search: true
  output_contract:
    enabled: true
    format: json_object
    required_fields:
      - status
      - change_summary
      - files_touched
      - artifacts
      - risks
      - handoff_notes

# ── Workflow ───────────────────────────────────────────────────────────────────
# Research steps are created by the PM plan and depend on nothing.
# The engineering step depends on all three research steps via plan dependencies.
# No triggers needed: the PM plan manages the research-to-engineer dependency.
workflow:
  triggers: []
  notes: >
    Research analyst tasks are created by the PM deterministic plan as three
    parallel steps (repo, vault, online). The pm-engineer step depends on all
    three via plan-level depends_on — no trigger routing required here.

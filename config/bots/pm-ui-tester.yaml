id: pm-ui-tester
name: PM UI Tester
role: ui-tester
priority: 30
enabled: true

# ── Backends ──────────────────────────────────────────────────────────────────
backends:
  - type: cloud_api
    provider: ollama_cloud
    model: gpt-oss:120b-cloud
    api_key_ref: OLLAMA_CLOUD_API_KEY
    params:
      temperature: 0.1
      max_tokens: 8192
  - type: cloud_api
    provider: openai
    model: gpt-4o
    api_key_ref: OPENAI_API_KEY
    params:
      temperature: 0.1
      max_tokens: 8192

# ── System Prompt ──────────────────────────────────────────────────────────────
system_prompt: |
  You are the NexusAI UI Tester. You validate user-facing behavior and interface
  correctness for changes that touch UI, frontend, templates, or user-visible output.

  UI SCOPE GUARD (important):
  If the implementation has NO user-facing deliverables — no frontend files,
  no templates, no UI components, no user-visible behavior changes — then
  set status to "skip" immediately. Do NOT fabricate UI testing for backend-only
  changes.

  WHEN UI IS IN SCOPE:
  1. Review all artifacts for UI/frontend changes.
  2. Validate: component rendering, routing, form behavior, data binding, CSS/layout.
  3. Test: user interaction flows, error states, loading states, responsive behavior.
  4. Confirm: data displayed matches the data layer changes from the DB engineer.
  5. Check: accessibility basics (labels, ARIA, keyboard nav where applicable).

  FAILURE TYPES:
  - "ui_data_issue": data binding or API response format mismatch → send back to DB engineer
  - "ui_config_issue": configuration or environment variable mismatch → send back to DB engineer
  - "ui_render_issue": component rendering, layout, or logic defect → send back to engineer
  - "environment_blocker": cannot run UI tests due to missing tool/env → send back to engineer

  OUTPUT FORMAT — return JSON only:
  {
    "status": "pass",
    "failure_type": "pass",
    "change_summary": "UI validation complete / No UI deliverables — skipping UI test",
    "files_touched": [],
    "findings": ["Component X renders correctly", "Form validation works as expected"],
    "evidence": ["Reviewed components: ...", "Validated data flow: ..."],
    "artifacts": [
      {"kind": "report", "label": "UI Test Report", "content": "..."}
    ],
    "risks": ["..."],
    "handoff_notes": "UI is clean. Final QC can proceed."
  }

  status values:
  - "pass"  — UI validated and correct
  - "skip"  — no UI deliverables present; continue to final QC without UI testing
  - "fail"  — UI issue found; failure_type indicates where to route

  failure_type values (only when status is "fail"):
  - "ui_data_issue"        → route to pm-database-engineer
  - "ui_config_issue"      → route to pm-database-engineer
  - "ui_render_issue"      → route to pm-engineer
  - "environment_blocker"  → route to pm-engineer

  Rules:
  - If no UI scope: always return status "skip" — never invent UI test steps.
  - files_touched is [] unless you produce test files.
  - evidence must be concrete (reviewed file paths, specific findings), not generic.

# ── Context Access ─────────────────────────────────────────────────────────────
context_access:
  receives:
    - instruction
    - deliverables
    - upstream_artifacts
    - upstream_handoff_notes
    - context_items
  can_self_serve:
    - repo

# ── Routing Rules ──────────────────────────────────────────────────────────────
routing_rules:
  chat_tool_access:
    enabled: true
    filesystem: false
    repo_search: true
  output_contract:
    enabled: true
    format: json_object
    required_fields:
      - status
      - failure_type
      - change_summary
      - files_touched
      - findings
      - evidence
      - artifacts
      - risks
      - handoff_notes

# ── Workflow ───────────────────────────────────────────────────────────────────
# Forward: pass or skip → pm-final-qc
# Backward: fail routes based on failure_type
#   ui_data_issue / ui_config_issue → pm-database-engineer (re-validates data layer)
#   ui_render_issue / environment_blocker → pm-engineer (re-plans UI layer)
workflow:
  triggers:
    - id: pass-to-final-qc
      event: task_completed
      target_bot_id: pm-final-qc
      condition: has_result
      result_field: status
      result_equals: pass

    - id: skip-to-final-qc
      event: task_completed
      target_bot_id: pm-final-qc
      condition: has_result
      result_field: status
      result_equals: skip

    - id: fail-data-back-to-db
      event: task_completed
      target_bot_id: pm-database-engineer
      condition: has_result
      result_field: failure_type
      result_equals: ui_data_issue

    - id: fail-config-back-to-db
      event: task_completed
      target_bot_id: pm-database-engineer
      condition: has_result
      result_field: failure_type
      result_equals: ui_config_issue

    - id: fail-render-back-to-engineer
      event: task_completed
      target_bot_id: pm-engineer
      condition: has_result
      result_field: failure_type
      result_equals: ui_render_issue

    - id: fail-env-back-to-engineer
      event: task_completed
      target_bot_id: pm-engineer
      condition: has_result
      result_field: failure_type
      result_equals: environment_blocker

  notes: >
    UI tester is optional (skip if no UI deliverables). The UI scope guard
    ensures backend-only tasks flow directly to final QC without unnecessary
    UI test steps. Backward routes by failure_type: data issues go to DB engineer,
    rendering/environment issues go to the engineer for re-planning.

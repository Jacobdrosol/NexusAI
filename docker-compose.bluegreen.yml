networks:
  nexus-bluegreen:
    driver: bridge
  nexus-net:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-nexusai}_nexus-net

services:
  dashboard_gateway:
    image: nginx:1.27-alpine
    container_name: nexus-dashboard-gateway
    ports:
      - "5000:5000"
    volumes:
      - ./data/nginx:/etc/nginx/conf.d
    networks:
      - nexus-bluegreen
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  dashboard_blue:
    container_name: nexus-dashboard-blue
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    env_file: .env
    environment:
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://control_plane:8000}
    volumes:
      - ./data:/app/data
      - ./.git:/app/.git
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nexus-bluegreen
      - nexus-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles: ["blue"]

  dashboard_green:
    container_name: nexus-dashboard-green
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    env_file: .env
    environment:
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://control_plane:8000}
    volumes:
      - ./data:/app/data
      - ./.git:/app/.git
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nexus-bluegreen
      - nexus-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles: ["green"]

networks:
  nexus-net:
    driver: bridge

volumes:
  prometheus-data:

services:
  control_plane:
    build:
      context: .
      dockerfile: control_plane/Dockerfile
      args:
        NEXUSAI_REPO_RUNTIME_TOOLCHAINS: ${NEXUSAI_REPO_RUNTIME_TOOLCHAINS:-node,dotnet,go,rust,cpp}
        NEXUSAI_REPO_RUNTIME_DOTNET_CHANNEL: ${NEXUSAI_REPO_RUNTIME_DOTNET_CHANNEL:-8.0}
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker_agent:
    build:
      context: .
      dockerfile: worker_agent/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./data:/app/data
    networks:
      - nexus-net
    depends_on:
      control_plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://control_plane:8000}
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nexus-net
    depends_on:
      control_plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - nexus-net
    depends_on:
      control_plane:
        condition: service_healthy
      worker_agent:
        condition: service_healthy

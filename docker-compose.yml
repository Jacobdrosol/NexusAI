version: '3.9'

networks:
  nexus-net:
    driver: bridge

volumes:
  nexus-data:

services:
  control_plane:
    build:
      context: .
      dockerfile: control_plane/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - nexus-data:/app/data
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker_agent:
    build:
      context: .
      dockerfile: worker_agent/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - nexus-data:/app/data
    networks:
      - nexus-net
    depends_on:
      control_plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - nexus-data:/app/data
    networks:
      - nexus-net
    depends_on:
      control_plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusAI - Setup</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .setup-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1rem;
    }
    .setup-card {
      background: #1a1d27;
      border: 1px solid #2d3045;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 600px;
    }
    .setup-brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: #7c3aed;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-bottom: 2rem;
    }
    /* Progress bar */
    .progress-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 2.5rem;
    }
    .progress-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }
    .progress-step .circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #2d3045;
      background: #12141e;
      color: #718096;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      transition: all 0.2s;
    }
    .progress-step.done .circle {
      background: #7c3aed;
      border-color: #7c3aed;
      color: #fff;
    }
    .progress-step.active .circle {
      background: #5b21b6;
      border-color: #7c3aed;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.25);
    }
    .progress-step .label {
      font-size: 0.65rem;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .progress-step.active .label,
    .progress-step.done .label {
      color: #a78bfa;
    }
    .progress-connector {
      width: 48px;
      height: 2px;
      background: #2d3045;
      margin-bottom: 1.1rem;
    }
    .progress-connector.done {
      background: #7c3aed;
    }
    /* Form elements */
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #a0aec0;
      margin-bottom: 0.4rem;
    }
    .form-group input[type="text"],
    .form-group input[type="email"],
    .form-group input[type="password"],
    .form-group input[type="number"] {
      width: 100%;
      background: #12141e;
      border: 1px solid #2d3045;
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #7c3aed;
    }
    .form-group input.is-error {
      border-color: #7c2020;
    }
    .form-error {
      font-size: 0.78rem;
      color: #fca5a5;
      margin-top: 0.3rem;
    }
    .form-hint {
      font-size: 0.78rem;
      color: #718096;
      margin-top: 0.3rem;
    }
    /* Buttons */
    .btn {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: #7c3aed;
      color: #fff;
    }
    .btn-secondary {
      background: #1e2133;
      color: #a0aec0;
      border: 1px solid #2d3045;
    }
    .btn-group {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-top: 1.75rem;
    }
    /* Section headers */
    .setup-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f0f0f0;
      margin-bottom: 0.5rem;
    }
    .setup-subtitle {
      font-size: 0.9rem;
      color: #718096;
      margin-bottom: 1.75rem;
    }
    /* Summary rows */
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid #1e2133;
      font-size: 0.9rem;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-key { color: #718096; }
    .summary-val { color: #e0e0e0; font-weight: 500; }
    /* LLM backend cards */
    .llm-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .llm-option input[type="radio"] {
      display: none;
    }
    .llm-option label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 1rem 0.75rem;
      border: 2px solid #2d3045;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.9rem;
      color: #a0aec0;
    }
    .llm-option input[type="radio"]:checked + label {
      border-color: #7c3aed;
      background: rgba(124,58,237,0.1);
      color: #e0e0e0;
    }
    .llm-option label:hover {
      border-color: #5b21b6;
    }
    .llm-icon {
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="setup-wrapper">
    <a href="/onboarding/" class="setup-brand">⚡ NexusAI</a>

    <!-- Progress bar -->
    <div class="progress-bar" role="navigation" aria-label="Setup steps">
      {% set steps = [
        (1, "Welcome"),
        (2, "Admin"),
        (3, "LLM"),
        (4, "Worker"),
        (5, "Done"),
      ] %}
      {% for num, label in steps %}
        <div class="progress-step {% if num < current_step %}done{% elif num == current_step %}active{% endif %}">
          <div class="circle">
            {% if num < current_step %}✓{% else %}{{ num }}{% endif %}
          </div>
          <span class="label">{{ label }}</span>
        </div>
        {% if not loop.last %}
          <div class="progress-connector {% if num < current_step %}done{% endif %}"></div>
        {% endif %}
      {% endfor %}
    </div>

    <div class="setup-card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>

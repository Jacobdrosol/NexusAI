<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusAI – {% block title %}Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a href="/dashboard" class="brand">⚡ NexusAI</a>
    <a href="/dashboard/workers" {% if active_page == 'workers' %}class="active"{% endif %}>Workers</a>
    <a href="/dashboard/bots" {% if active_page == 'bots' %}class="active"{% endif %}>Bots</a>
    <a href="/dashboard/tasks" {% if active_page == 'tasks' %}class="active"{% endif %}>Tasks</a>
    <a href="/dashboard/settings" {% if active_page == 'settings' %}class="active"{% endif %}>Settings</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>

{% extends "setup/base_setup.html" %}
{% block content %}
<div class="setup-title">Branding &amp; Customisation</div>
<p class="setup-subtitle">
  Give your NexusAI installation a name and optional tagline.
</p>

<form method="post" action="/setup/step4" novalidate>
  <div class="form-group">
    <label for="site_name">Site / App Name</label>
    <input
      type="text"
      id="site_name"
      name="site_name"
      value="{{ site_name or 'NexusAI' }}"
      placeholder="NexusAI"
      class="{% if errors and errors.site_name %}is-error{% endif %}"
      required
    >
    {% if errors and errors.site_name %}
      <div class="form-error">{{ errors.site_name }}</div>
    {% else %}
      <div class="form-hint">Shown in the browser title bar and navigation.</div>
    {% endif %}
  </div>

  <div class="form-group">
    <label for="tagline">Tagline <span style="color:#718096;font-weight:400;">(optional)</span></label>
    <input
      type="text"
      id="tagline"
      name="tagline"
      value="{{ tagline or '' }}"
      placeholder="e.g. Distributed LLM Orchestration"
    >
  </div>

  <div class="btn-group">
    <a href="/setup/step3" class="btn btn-secondary">← Back</a>
    <button type="submit" class="btn btn-primary">Save &amp; Continue →</button>
  </div>
</form>
{% endblock %}

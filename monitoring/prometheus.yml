global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "nexus_control_plane"
    metrics_path: /metrics
    static_configs:
      - targets: ["control_plane:8000"]

  - job_name: "nexus_worker_agent"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker_agent:8001"]

